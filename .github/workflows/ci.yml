name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web · lint · typecheck · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @twinops/web lint
      - run: pnpm --filter @twinops/web typecheck
      - run: pnpm --filter @twinops/web build

  api:
    name: api · ruff · pyright · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright
      - run: uv run pytest

  contracts:
    name: contracts · drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
      - run: pnpm install --frozen-lockfile
      - run: uv sync --directory apps/api
      - run: bash scripts/generate-contracts.sh
      - name: fail on drift (regenerate and commit if this fails)
        run: git diff --exit-code -- packages/contracts
